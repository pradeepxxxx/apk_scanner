<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>APK Security Scanner</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='home.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>

    <div class="overlay"></div>

    <div class="container">
        <div class="card">
            <h1>APK Security Scanner</h1>
            <p class="subtitle">Static Android APK security analysis</p>

            <form id="scanForm" enctype="multipart/form-data">
                <label class="upload-box">
                    <input type="file" name="apk" id="apkInput" accept=".apk" required>
                    <div class="upload-content">
                        <div class="upload-icon">📁</div>
                        <p id="fileText">Click to upload APK</p>
                        <span>Only .apk files supported</span>
                    </div>
                </label>
                <button type="submit" class="scan-btn" id="submitBtn">Scan APK</button>
            </form>

            <div id="uploadStatus">
                <div class="upload-progress-container">
                    <div id="uploadBarFill"></div>
                </div>
                <p id="uploadStatusText">Uploading: 0%</p>
            </div>
        </div>
    </div>

    <div id="loadingScreen">
        <div class="loader"></div>
        <p id="scanText">Scanning APK...</p>
        <div class="progress-bar">
            <div class="progress" id="progress"></div>
        </div>
        <span id="percent">0%</span>
    </div>

    <script>
        const form = document.getElementById("scanForm");
const fileInput = document.getElementById("apkInput");
const fileText = document.getElementById("fileText");
const submitBtn = document.getElementById("submitBtn");
const uploadStatus = document.getElementById("uploadStatus");
const uploadBarFill = document.getElementById("uploadBarFill");
const uploadStatusText = document.getElementById("uploadStatusText");

const loadingScreen = document.getElementById("loadingScreen");
const progressBar = document.getElementById("progress");
const percentText = document.getElementById("percent");

let scanProgress = 0;
let serverResponse = "";
let animationInterval;

/* SHOW FILE NAME */
fileInput.addEventListener("change", function () {
    const file = this.files[0];
    if (!file) return;
    if (!file.name.endsWith(".apk")) {
        alert("Only APK files allowed");
        this.value = "";
        return;
    }
    fileText.innerText = file.name;
});

/* SCANNING ANIMATION (0 to 80%) */
function startScanAnimation() {
    // Hide upload status and show full-screen scanner
    uploadStatus.style.display = "none";
    loadingScreen.style.display = "flex";

    animationInterval = setInterval(() => {
        if (scanProgress < 80) {
            scanProgress += 1;
            progressBar.style.width = scanProgress + "%";
            percentText.innerText = scanProgress + "%";
        }
        
        // If server responded while we were still climbing to 80,
        // stop this interval and trigger the finish.
        if (serverResponse !== "" && scanProgress >= 80) {
            clearInterval(animationInterval);
            finishScan();
        }
    }, 150); // Speed of the 0-80% crawl
}


/* FINISH SCAN (80 to 100%) */
function finishScan() {
    const finishInterval = setInterval(() => {
        if (scanProgress < 100) {
            scanProgress++;
            progressBar.style.width = scanProgress + "%";
            percentText.innerText = scanProgress + "%";
        } else {
            clearInterval(finishInterval);
            setTimeout(() => {
                document.open();
                document.write(serverResponse);
                document.close();
            }, 400);
        }
    }, 30);
}

/* FORM SUBMIT */
form.addEventListener("submit", function (e) {
    e.preventDefault();
    
    submitBtn.style.display = "none";
    uploadStatus.style.display = "block";

    const formData = new FormData(form);
    const xhr = new XMLHttpRequest();

    // 1. TRACK UPLOAD
    xhr.upload.addEventListener("progress", (e) => {
        if (e.lengthComputable) {
            const percent = Math.round((e.loaded / e.total) * 100);
            uploadBarFill.style.width = percent + "%";
            uploadStatusText.innerText = `Uploading: ${percent}%`;
            
            // AS SOON AS UPLOAD IS DONE, START THE SCAN ANIMATION
            if(percent === 100) {
                uploadStatusText.innerText = "Upload Complete! Initializing Scan...";
                // Small delay so the user sees "Complete" before the screen switches
                setTimeout(() => {
                    if (loadingScreen.style.display !== "flex") {
                        startScanAnimation();
                    }
                }, 800);
            }
        }
    });

    // 2. TRACK SERVER RESPONSE (The actual scanning)
    xhr.onreadystatechange = function () {
        if (xhr.readyState === 4) {
            if (xhr.status === 200) {
                serverResponse = xhr.responseText;
                // If the animation already reached 80%, trigger finish immediately
                if (scanProgress >= 80) {
                    clearInterval(animationInterval);
                    finishScan();
                }
            } else {
                alert("Error during scan. Please try again.");
                location.reload();
            }
        }
    };

    xhr.open("POST", "/", true);
    xhr.send(formData);
});
    </script>
</body>
</html>
